<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG 시스템{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background-color: #f8f9fa;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }
        .nav-link {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #007bff;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-link">홈</a>
            <a href="/rag" class="nav-link">RAG 학습</a>
            <a href="/doc" class="nav-link">문서 목록</a>
            <a href="/docs/llm-rag" class="nav-link">LLM RAG 문서</a>
            <a href="/prompt-templates" class="nav-link">프롬프트 템플릿</a>
            <a href="/prompt-chat" class="nav-link">프롬프트 템플릿 채팅</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
